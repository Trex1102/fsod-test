_BASE_: "../../Base-RCNN.yaml"
MODEL:
  WEIGHTS: "/Path/to/ImageNet/Pretrain/Weight"
  MASK_ON: False
  RESNETS:
    DEPTH: 101
  RPN:
    ENABLE_DECOUPLE: True
    BACKWARD_SCALE: 0.0
  ROI_HEADS:
    NUM_CLASSES: 15
    ENABLE_DECOUPLE: True
    BACKWARD_SCALE: 0.75
  DYNAMIC_GDL:
    ENABLE: True
    REDUCTION: 16
    RPN_INIT_LAMBDA: 0.0
    RCNN_INIT_LAMBDA: 0.75
    DUAL_PATHWAY: True
    ORTHO_LOSS_WEIGHT: 0.1
    FREEZE_GATE_NOVEL: True
INPUT:
  MIN_SIZE_TRAIN: (480, 512, 544, 576, 608, 640, 672, 704, 736, 768, 800)
  MIN_SIZE_TEST: 800
DATASETS:
  TRAIN: ('voc_2007_trainval_base1', 'voc_2012_trainval_base1')
  TEST: ('voc_2007_test_base1',)
SOLVER:
  IMS_PER_BATCH: 8
  BASE_LR: 0.01
  STEPS: (20000, 26600)
  MAX_ITER: 30000
  CHECKPOINT_PERIOD: 200000
  WARMUP_ITERS: 200
  CLIP_GRADIENTS:
    ENABLED: True
    CLIP_TYPE: "norm"
    CLIP_VALUE: 1.0
    NORM_TYPE: 2.0
OUTPUT_DIR: "/Path/to/Output/Dir"
