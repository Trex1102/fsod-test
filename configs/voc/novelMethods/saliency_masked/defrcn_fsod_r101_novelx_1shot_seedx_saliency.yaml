_BASE_: "../../defrcn_fsod_r101_novelx_1shot_seedx.yaml"
TEST:
  PCB_ENABLE: True
  PCB_MODELPATH: "/Path/to/ImageNet/Pre-Train/Weight"
NOVEL_METHODS:
  ENABLE: True
  METHOD: "saliency_masked"
  SALIENCY_MASKED:
    ENABLE: True
    # Saliency computation mode:
    # - gradient_magnitude: Uses spatial gradients (object boundaries)
    # - channel_attention: Uses channel variance (discriminative features)
    # - spatial_std: Uses deviation from spatial mean
    MODE: "gradient_magnitude"
    THRESHOLD_PERCENTILE: 50.0   # Percentile for hard threshold (if soft_mask=False)
    SOFT_MASK: True              # Use soft sigmoid mask vs hard threshold
    TEMPERATURE: 1.0             # Temperature for soft mask sharpness
    BLEND_WEIGHT: 0.5            # Blend saliency-purified vs original prototype
