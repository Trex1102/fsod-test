  PCB_MODELPATH: "/Path/to/ImageNet/Pre-Train/Weight"
NOVEL_METHODS:
  ENABLE: True
  METHOD: "pcb_fma_enhanced_neg"
  PCB_FMA_ENHANCED:
    ENABLE: True
    FM_MODEL_NAME: "dinov2_vitb14"
    FM_MODEL_PATH: ""
    FM_FEAT_DIM: 768
